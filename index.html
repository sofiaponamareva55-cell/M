<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Статус Монитор 🎀</title>
    <style>
        :root {
            --bg: #fff5f7; 
            --card: #ffffff;
            --text: #6b4f57; 
            --primary: #ffb7c5; 
            --danger: #ff8b94; 
            --warning: #ffdac1; 
            --success: #b5ead7; 
            --border: #ffe3e8; 
        }

        body { 
            font-family: 'Comic Sans MS', 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(#ffdfe5 15%, transparent 15%), radial-gradient(#ffdfe5 15%, transparent 15%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px; 
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 30px 24px;
            border-radius: 24px; 
            box-shadow: 0 8px 24px rgba(255, 183, 197, 0.25); 
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 2px solid #ffe8ec;
        }

        h1 { 
            font-size: 26px; 
            margin-top: 0; 
            text-align: center; 
            color: #ff7890;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--border); 
        }

        #myInfo { 
            font-weight: bold; 
            font-size: 15px; 
            color: #ff7890;
            background: #fff0f2;
            padding: 6px 12px;
            border-radius: 20px;
        }

        #btn-logout {
            background: #fff0f2;
            color: #ff7890;
            padding: 6px 14px;
            font-size: 12px;
            border: 1px solid #ffcbd4;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #btn-logout:hover {
            background: #ffcbd4;
            color: white;
        }

        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b8b;
            text-align: center;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #fffafb;
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed #ffcbd4;
        }

        .timer-display.pulse {
            animation: cute-pulse 2s infinite;
        }
        @keyframes cute-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 139, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(255, 107, 139, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 139, 0); }
        }

        #groupList {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 14px 18px; 
            background: #fff8f9;
            border: 1px solid var(--border);
            border-radius: 16px; 
            transition: transform 0.2s;
        }
        .user-item:hover { transform: translateY(-2px); }

        .user-left { display: flex; align-items: center; }

        .status-dot { 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            margin-right: 15px; 
            box-shadow: 0 0 0 3px #fff, 0 0 8px rgba(0,0,0,0.05);
            background: #ccc;
        }

        .user-info strong { font-size: 15px; display: block; color: #5a4449; }
        .user-info small { 
            background: #ffffff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px; 
            font-weight: bold;
            display: inline-block;
            margin-top: 4px;
            border: 1px solid #ffe3e8;
        }

        .user-right {
            text-align: right;
            font-size: 12px;
            font-weight: bold;
            color: #ff7890;
            background: #ffffff;
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid #ffe3e8;
        }

        /* --- КРАСИВЫЙ РОЗОВЫЙ ЧАТ (ВЕРНУЛСЯ!) --- */
        .chat-box {
            height: 150px;
            overflow-y: auto;
            border: 1px dashed #ffcbd4;
            border-radius: 16px;
            padding: 12px;
            font-size: 13px;
            background: #fffafb;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-input-group {
            display: flex;
            gap: 8px;
        }
        .chat-input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-family: inherit;
            color: var(--text);
            background: #fff8f9;
        }
        .chat-input-group input:focus {
            border-color: #ff9eaf;
            background: #fff;
        }
        .btn-send {
            background: linear-gradient(135deg, #ffcbd4, #ff9eaf);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-send:active { transform: scale(0.95); }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 10px;
        }

        .controls button { 
            padding: 15px 5px; 
            cursor: pointer; 
            border: none; 
            border-radius: 14px; 
            font-weight: bold;
            font-size: 14px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .controls button:active { transform: scale(0.95); }

        #session-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, #ffb7c5, #ff9eaf);
            color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
        }
        #session-btn.active {
            background: linear-gradient(135deg, #ff8b94, #ff6b8b);
        }

        #btn-break {
            background: linear-gradient(135deg, #ffdac1, #ffb7a1);
            color: #835743;
        }

        #btn-login {
            width: 100%;
            background: linear-gradient(135deg, #ffb7c5, #ff7890);
            color: white;
            font-size: 16px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(255, 120, 144, 0.3);
            transition: 0.2s;
        }

        .hidden { display: none; }
        
        .section-title {
            margin: 5px 0 0 0; 
            font-size: 14px; 
            color: #a8838c; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-section">
            <h1>🌸 Статус Монитор 🌸</h1>
            <p style="text-align:center; color: #8e7177; font-size: 14px;">Войдите через Google, чтобы открыть волшебный таймер ✨</p>
            <button id="btn-login">Войти через Google 🐾</button>
        </div>

        <div id="app-section" class="hidden">
            <div class="profile-header">
                <div id="myInfo">👑 Загрузка...</div>
                <button id="btn-logout">Выйти 🚪</button>
            </div>

            <div id="cute-timer-container" class="timer-display">
                <span>🧁</span> <span id="stopwatch">00:00:00</span>
            </div>
            
            <div class="section-title">✨ Монитор нашей группы ✨</div>
            <div id="groupList">
                <p style="text-align:center; color:#c7aab0; font-size: 13px;">Милые котики загружаются... 🐾</p>
            </div>

            <div class="section-title">💬 Наш уютный чатик</div>
            <div id="chat-messages" class="chat-box"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="Напиши что-нибудь милое...">
                <button class="btn-send" onclick="sendMessage()">💌</button>
            </div>

            <div class="controls">
                <button id="session-btn" onclick="handleSession()">💖 Начать сессию</button>
                <button id="btn-break" onclick="togglePause()">🍼 Перерыв</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://tqtpdtforramqzhjqalf.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxdHBkdGZvcnJhbXF6aGpxYWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDQyNDUsImV4cCI6MjA5MTM4MDI0NX0.c6bFblzCpMXn0ssNZD8BeOlzk21aTdO1fjxhPEVluuk';

        const supabase = createClient(URL, KEY);
        
        let userSession = null;
        let groupProfiles = [];
        let seconds = 0;
        let timerInterval = null;
        let isPaused = false;
        let isSessionActive = false;

        document.getElementById('btn-login').onclick = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
        document.getElementById('btn-logout').onclick = async () => { await supabase.auth.signOut(); window.localStorage.clear(); window.sessionStorage.clear(); window.location.reload(); };

        window.handleSession = async () => {
            if (!userSession) return;
            const btn = document.getElementById('session-btn');
            const timerContainer = document.getElementById('cute-timer-container');

            if (!isSessionActive) {
                isSessionActive = true;
                isPaused = false;
                seconds = 0;
                const startTime = new Date().toISOString();

                btn.innerText = "🌸 Завершить сессию";
                btn.classList.add('active');
                timerContainer.classList.add('pulse');

                await supabase.from('profiles').upsert({ 
                    id: userSession.id, 
                    username: userSession.user_metadata.full_name || userSession.email,
                    status: 'Работаю', 
                    color: '#b5ead7', 
                    started_at: startTime
                });

                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => { if (!isPaused) { seconds++; updateTimerDisplay(); } }, 1000);
            } else {
                isSessionActive = false;
                clearInterval(timerInterval);
                btn.innerText = "💖 Начать сессию";
                btn.classList.remove('active');
                timerContainer.classList.remove('pulse');

                const breakBtn = document.getElementById('btn-break');
                breakBtn.innerText = '🍼 Перерыв';
                breakBtn.style.background = 'linear-gradient(135deg, #ffdac1, #ffb7a1)';
                breakBtn.style.color = '#835743';

                await supabase.from('profiles').update({ status: 'Отдыхаю', color: '#ff8b94', started_at: null }).eq('id', userSession.id);
                seconds = 0; updateTimerDisplay();
            }
            fetchGroup();
        };

        function updateTimerDisplay() {
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('stopwatch').innerText = `${h}:${m}:${s}`;
        }

        window.togglePause = async () => {
            if (!isSessionActive || !userSession) return;
            isPaused = !isPaused;
            const breakBtn = document.getElementById('btn-break');

            if (isPaused) {
                breakBtn.innerText = '🐾 Продолжить';
                breakBtn.style.background = 'linear-gradient(135deg, #b5ead7, #96dbbe)';
                breakBtn.style.color = '#386955';
                await supabase.from('profiles').update({ status: 'Обедаю', color: '#ffdac1' }).eq('id', userSession.id);
            } else {
                breakBtn.innerText = '🍼 Перерыв';
                breakBtn.style.background = 'linear-gradient(135deg, #ffdac1, #ffb7a1)';
                breakBtn.style.color = '#835743';
                await supabase.from('profiles').update({ status: 'Работаю', color: '#b5ead7' }).eq('id', userSession.id);
            }
            fetchGroup();
        };

        // ЛОГИКА СИНХРОНИЗАЦИИ ЧАТА (Добавлена обратно)
        async function fetchChat() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(40);
            if (data) {
                document.getElementById('chat-messages').innerHTML = '';
                data.forEach(addMessageToUI);
            }
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            await supabase.from('messages').insert({
                user_id: userSession.id,
                user_name: userSession.user_metadata.full_name || userSession.email,
                content: text
            });
            input.value = '';
        };

        function addMessageToUI(msg) {
            const box = document.getElementById('chat-messages');
            if (!box) return;
            const div = document.createElement('div');
            div.style.padding = "2px 0";
            div.style.borderBottom = "1px dashed #fff0f2";
            div.innerHTML = `<strong style="color: #ff7890;">${msg.user_name || 'Аноним'}:</strong> <span style="color: #5a4449;">${msg.content}</span>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function fetchGroup() {
            const { data } = await supabase.from('profiles').select('*').order('username');
            groupProfiles = data || [];
            renderGroupList();
        }

        function renderGroupList() {
            const listContainer = document.getElementById('groupList');
            if (!listContainer) return;

            listContainer.innerHTML = groupProfiles.map(user => {
                let timeStr = "0ч 0м 0с";
                if (user.started_at) {
                    const diff = Math.floor((new Date() - new Date(user.started_at)) / 1000);
                    const h = Math.floor(diff / 3600);
                    const m = Math.floor((diff % 3600) / 60);
                    const s = diff % 60;
                    timeStr = `${h}ч ${m}м ${s}с`;
                }

                let statusTextColor = '#8e7177';
                if (user.status === 'Работаю') statusTextColor = '#386955';
                if (user.status === 'Обедаю') statusTextColor = '#835743';
                if (user.status === 'Отдыхаю') statusTextColor = '#a34850';

                return `
                    <div class="user-item">
                        <div class="user-left">
                            <div class="status-dot" style="background: ${user.color || '#e4e6eb'}"></div>
                            <div class="user-info">
                                <strong>${user.username || 'Участник'}</strong>
                                <small style="color: ${statusTextColor}; border-color: ${user.color || '#ffe3e8'};">${user.status || 'Отдыхает'}</small>
                            </div>
                        </div>
                        <div class="user-right">
                            🌸 ${timeStr}
                        </div>
                    </div>
                `;
            }).join('');

            const currentUser = groupProfiles.find(u => u.id === userSession.id);
            if (currentUser) document.getElementById('myInfo').innerText = `🎀 ${currentUser.username}`;
        }

        // Подключаем реалтайм к чату, чтобы сообщения сыпались на лету
        function setupRealtimeChat() {
            supabase.channel('chat-sync')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    addMessageToUI(payload.new);
                })
                .subscribe();
        }

        async function init() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                userSession = data.session.user;
                document.getElementById('myInfo').innerText = `🎀 ${userSession.user_metadata.full_name || userSession.email}`;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                
                await fetchGroup();
                await fetchChat();
                setupRealtimeChat();
                
                setInterval(fetchGroup, 1000);
            }
        }

        init();
    </script>
</body>
</html>
